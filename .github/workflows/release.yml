name: release

on:
  push:
    tags: ['v*']
  # Manual re-run for a tag whose release workflow was missed (e.g. an
  # Actions outage). Invoke with: gh workflow run release.yml --ref <tag>
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Guard release version (monotonic + matches VERSION)
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          git fetch --tags --force --quiet || true
          TAG="${GITHUB_REF_NAME}"
          if [ -f VERSION ]; then
            VER="$(tr -d '[:space:]' < VERSION)"
            if [ "v$VER" != "$TAG" ]; then
              echo "::error::VERSION file ($VER) does not match pushed tag ($TAG)"
              exit 1
            fi
          fi
          PREV="$(git tag --list 'v*' --sort=-v:refname | grep -vx "$TAG" | head -1 || true)"
          if [ -n "$PREV" ]; then
            TOP="$(printf '%s\n%s\n' "${TAG#v}" "${PREV#v}" | sort -V | tail -1)"
            if [ "$TOP" != "${TAG#v}" ]; then
              echo "::error::refusing backwards release: $TAG is not greater than existing latest $PREV"
              exit 1
            fi
          fi
          echo "release guard OK: $TAG > ${PREV:-<none>}"

      - name: Build release artefacts
        run: make release-local VERSION="${GITHUB_REF_NAME#v}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

      # ---- Homebrew tap update --------------------------------------------
      # Renders Formula/burnbox.rb from packaging/homebrew/burnbox.rb.tmpl
      # using the just-built checksums, then commits + pushes it to
      # github.com/kfet/homebrew-tap. Requires repo secret HOMEBREW_TAP_TOKEN
      # — a fine-grained PAT with contents:write on that tap repo. The
      # default GITHUB_TOKEN cannot push to a different repository.
      - name: Render Homebrew formula
        run: |
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p tap/Formula
          scripts/render-formula.sh "$ver" dist/checksums.txt tap/Formula/burnbox.rb
          cat tap/Formula/burnbox.rb

      - name: Push to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set; skipping tap update"
            exit 0
          fi
          ver="${GITHUB_REF_NAME#v}"
          tmp=$(mktemp -d)
          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/kfet/homebrew-tap.git" \
            "$tmp/tap"
          mkdir -p "$tmp/tap/Formula"
          cp tap/Formula/burnbox.rb "$tmp/tap/Formula/burnbox.rb"
          cd "$tmp/tap"
          git config user.name  "burnbox-release[bot]"
          git config user.email "burnbox-release@users.noreply.github.com"
          git add Formula/burnbox.rb
          if git diff --cached --quiet; then
            echo "tap already up to date"
            exit 0
          fi
          git commit -m "burnbox ${ver}"
          git push origin HEAD
